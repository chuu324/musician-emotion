name: Move repository into ex2 preserving structure

on:
  workflow_dispatch:

jobs:
  move-to-ex2:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Set git user
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create branch for move
        id: create_branch
        run: |
          BRANCH="move-all-to-ex2-$(date +%s)"
          echo "branch=$BRANCH" >> $GITHUB_OUTPUT
          git checkout -b "$BRANCH"

      - name: Move tracked files into ex2/ preserving structure (exclude .github)
        run: |
          set -euo pipefail
          FILES=$(git ls-files --exclude-standard | grep -v '^.github/' || true)
          if [ -z "$FILES" ]; then
            echo "No tracked files found to move (or only .github files are tracked)."
            exit 0
          fi
          mkdir -p ex2
          printf '%s\n' "$FILES" | while IFS= read -r f; do
            [ -z "$f" ] && continue
            dst="ex2/$f"
            mkdir -p "$(dirname "$dst")"
            git mv -- "$f" "$dst" || { echo "git mv failed for $f"; exit 1; }
          done

          git status --porcelain
          git add -A
          git commit -m "Move repository files into ex2/ preserving structure" || echo "No changes to commit"

      - name: Push branch to origin
        run: |
          git push -u origin HEAD

      - name: Output branch name
        run: echo "Created branch ${{ steps.create_branch.outputs.branch }}. Please open a PR to merge into your target branch."
